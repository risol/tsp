services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: tsp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test123456
      # 时区设置为中国时区
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      # 初始化脚本
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: tsp-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化
      - redis_data:/data
      # 配置文件
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 可视化管理工具（可选）
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tsp-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=redis:6379
      - REDIS_HOSTS_TLS=
    ports:
      - "8081:8081"
    depends_on:
      - redis

  # phpMyAdmin（可选，用于 MySQL 管理）
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tsp-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123456
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - mysql

  # OpenLDAP 服务器（用于 LDAP 测试）
  openldap:
    image: osixia/openldap:1.5.0
    container_name: tsp-openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "Example Inc"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin123456"
      LDAP_TLS_VERIFY_CLIENT: "never"
      TZ: Asia/Shanghai
    ports:
      - "1389:389"
      - "1636:636"
    volumes:
      # 数据持久化
      - ldap_data:/var/lib/ldap
      # 配置持久化
      - ldap_config:/etc/ldap/slapd.d
      # 自定义 LDIF 文件
      - ./docker/ldap/test-users.ldif:/ldifs/test-users.ldif:ro
    command: [--copy-service]
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost:389", "-b", "dc=example,dc=org", "-D", "cn=admin,dc=example,dc=org", "-w", "admin123456", "(objectClass=*)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpLDAPadmin（LDAP 管理工具，可选）
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: tsp-phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
      PHPLDAPADMIN_TRUST_PROXY_SSL: "true"
    ports:
      - "8082:80"
    depends_on:
      - openldap

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  ldap_data:
    driver: local
  ldap_config:
    driver: local
