# Redis 配置文件
# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 数据库数量
databases 16

# 持久化配置
# 900 秒（15 分钟）内至少有 1 个 key 变化则保存快照
save 900 1
save 300 10
save 60 10000

# AOF 持久化
appendonly yes
appendfsync everysec

# 数据文件路径
dir /data

# 日志级别
loglevel notice

# 最大内存使用（2GB）
maxmemory 2gb

# 内存淘汰策略（LRU 算法）
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 密码（可选，生产环境建议设置）
# requirepass your_password

# RDB 快照文件名
dbfilename dump.rdb
